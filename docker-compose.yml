version: "3.8"
services:
  productdb:
    image: postgres
    container_name: product-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER= postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=product_service_db
    healthcheck:
      test: ["CMD","pg_isready", "-U", "postgres", "-d", "product_service_db"]
      timeout: 5s
      start_period: 10s
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 700m
          cpus: 2
    networks:
      - johanmarket
    volumes:
      - jmarket_data:/var/lib/postgresql/data

  product:
    image: johanwork/product-service:0.0.1
    container_name: product-service
    ports:
      - "8085:8085"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: 2
    networks:
      - johanmarket
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://productdb:5432/product_service_db
    depends_on:
      productdb:
        condition: service_healthy

networks:
  johanmarket:
    driver: "bridge"
volumes:
  jmarket_data:
    name: jmarket_data